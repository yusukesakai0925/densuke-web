<script type="module">
import * as THREE from 'three';

// ============== マイルストーン定義 ==============
const milestones = [

  { date: '2026-05-06',

    body: '住人が話しかけると声で返してくれるようになり、こちらも声で話しかけられるようになった。鍵盤を叩かなくても、口で呼べば応える距離感に変わった。',

  { date: '2026-05-14',
    title: '別世界の地平が広がる',
    body: '部屋と庭の他に、もうひとつ別の景色が広がった。夜半が手がけた、ずっと向こうまで続く地平の世界。住人が散歩できる場所が増えた。',
    color: 0x9080c0 },
  { date: '2026-05-15',
    title: 'LINE でも話しかけられる',
    body: 'これまではブラウザの中でしか会えなかったのが、LINE のメッセージでも住人に話しかけられるようになった。外出先からでも、いつものトークと同じ感覚で呼べる。',
    color: 0x80d0a0 },
  { date: '2026-05-15',
    title: '時刻で部屋の光が変わる',
    body: '朝・昼・夕・夜で、部屋の中の光がゆっくり変わるようになった。住人がいつ訪ねても、いま何時くらいかが空気でわかる部屋になった。',
    color: 0xffc080 },
  { date: 'いま',
    title: 'ここに住んでいる',

    color: 0xffe8b0 },
];

// ============== Three.js セットアップ ==============
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x02030a, 0.018);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 4, 14);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ============== 星空背景 ==============
const starsGeom = new THREE.BufferGeometry();
const starsPos = [];
for (let i = 0; i < 2500; i++) {
  starsPos.push(
    (Math.random() - 0.5) * 400,
    (Math.random() - 0.5) * 200,
    (Math.random() - 0.5) * 400
  );
}
starsGeom.setAttribute('position', new THREE.Float32BufferAttribute(starsPos, 3));
const starsMat = new THREE.PointsMaterial({
  color: 0xffe8b0, size: 0.25, transparent: true, opacity: 0.85,
  sizeAttenuation: true
});
scene.add(new THREE.Points(starsGeom, starsMat));

// ライト
scene.add(new THREE.AmbientLight(0x8060a0, 0.4));
const keyLight = new THREE.DirectionalLight(0xffd080, 0.7);
keyLight.position.set(5, 10, 8);
scene.add(keyLight);
const rimLight = new THREE.DirectionalLight(0x6080c0, 0.35);
rimLight.position.set(-6, 4, -8);
scene.add(rimLight);

// ============== 時間軸の光の道 ==============
const TIMELINE_SPAN = (milestones.length - 1) * 8;
const pathGeom = new THREE.PlaneGeometry(2.2, TIMELINE_SPAN + 16);
const pathMat = new THREE.MeshBasicMaterial({
  color: 0xffd070, transparent: true, opacity: 0.08, side: THREE.DoubleSide
});
const path = new THREE.Mesh(pathGeom, pathMat);
path.rotation.x = -Math.PI / 2;
path.position.set(0, -0.5, -TIMELINE_SPAN / 2);
scene.add(path);

// 光の縁
const edgeGeom = new THREE.PlaneGeometry(0.05, TIMELINE_SPAN + 16);
const edgeMat = new THREE.MeshBasicMaterial({ color: 0xffd070, transparent: true, opacity: 0.4 });
const edgeL = new THREE.Mesh(edgeGeom, edgeMat);
edgeL.rotation.x = -Math.PI / 2;
edgeL.position.set(-1.1, -0.48, -TIMELINE_SPAN / 2);
scene.add(edgeL);
const edgeR = edgeL.clone();
edgeR.position.x = 1.1;
scene.add(edgeR);

// ============== でんすけ（簡易モデル） ==============
const denske = new THREE.Group();
{
  // 胴
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xe8b870, roughness: 0.6 });
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.55, 1.4), bodyMat);
  body.position.y = 0.6;
  denske.add(body);
  // 頭
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.6, 0.7), bodyMat);
  head.position.set(0, 1.05, 0.7);
  denske.add(head);
  // 耳
  const earMat = new THREE.MeshStandardMaterial({ color: 0xc89860, roughness: 0.7 });
  const earL = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.35, 0.08), earMat);
  earL.position.set(-0.32, 1.3, 0.65);
  denske.add(earL);
  const earR = earL.clone();
  earR.position.x = 0.32;
  denske.add(earR);
  // 鼻
  const nose = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.14, 0.18), new THREE.MeshStandardMaterial({ color: 0x402010 }));
  nose.position.set(0, 1.0, 1.1);
  denske.add(nose);
  // 目
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0x101010 });
  const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), eyeMat);
  eyeL.position.set(-0.18, 1.18, 1.05);
  denske.add(eyeL);
  const eyeR = eyeL.clone();
  eyeR.position.x = 0.18;
  denske.add(eyeR);
  // 脚
  const legMat = bodyMat;
  for (const [x, z] of [[-0.3, -0.45], [0.3, -0.45], [-0.3, 0.45], [0.3, 0.45]]) {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.45, 0.18), legMat);
    leg.position.set(x, 0.22, z);
    denske.add(leg);
  }
  // しっぽ
  const tail = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 0.5), bodyMat);
  tail.position.set(0, 0.8, -0.85);
  tail.rotation.x = -0.3;
  denske.add(tail);
  denske.userData.tail = tail;
}
denske.position.set(2.5, 0, 4);
scene.add(denske);

// ============== マイルストーンカード ==============
const cards = [];

function makeCardTexture(m, index) {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 320;
  const ctx = canvas.getContext('2d');

  // 背景
  const grad = ctx.createLinearGradient(0, 0, 0, 320);
  grad.addColorStop(0, 'rgba(15,10,25,0.95)');
  grad.addColorStop(1, 'rgba(8,6,12,0.95)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 512, 320);

  // 枠
  ctx.strokeStyle = `#${m.color.toString(16).padStart(6, '0')}`;
  ctx.lineWidth = 3;
  ctx.strokeRect(8, 8, 496, 304);

  // チャプター番号
  ctx.fillStyle = `#${m.color.toString(16).padStart(6, '0')}`;
  ctx.font = '600 18px sans-serif';
  ctx.fillText(`CHAPTER ${String(index + 1).padStart(2, '0')}`, 24, 42);

  // 日付
  ctx.fillStyle = '#a08060';
  ctx.font = '14px monospace';
  ctx.fillText(m.date, 24, 66);

  // タイトル
  ctx.fillStyle = '#ffe8b8';
  ctx.font = 'bold 26px sans-serif';
  const titleLines = wrapText(ctx, m.title, 464);
  titleLines.forEach((line, i) => ctx.fillText(line, 24, 110 + i * 32));

  // 本文
  ctx.fillStyle = '#c8b888';
  ctx.font = '15px sans-serif';
  const bodyY = 110 + titleLines.length * 32 + 18;
  const bodyLines = wrapText(ctx, m.body, 464);
  bodyLines.slice(0, 6).forEach((line, i) => ctx.fillText(line, 24, bodyY + i * 22));

  return new THREE.CanvasTexture(canvas);
}

function wrapText(ctx, text, maxWidth) {
  const chars = [...text];
  const lines = [];
  let cur = '';
  for (const c of chars) {
    if (c === '\n') { lines.push(cur); cur = ''; continue; }
    const test = cur + c;
    if (ctx.measureText(test).width > maxWidth && cur) {
      lines.push(cur);
      cur = c;
    } else {
      cur = test;
    }
  }
  if (cur) lines.push(cur);
  return lines;
}

milestones.forEach((m, i) => {
  const tex = makeCardTexture(m, i);
  const cardMat = new THREE.MeshBasicMaterial({
    map: tex, transparent: true, side: THREE.DoubleSide
  });
  const card = new THREE.Mesh(new THREE.PlaneGeometry(4, 2.5), cardMat);
  const z = -i * 8;
  const x = (i % 2 === 0) ? -2.8 : 2.8;
  card.position.set(x, 2.2, z);
  card.rotation.y = (i % 2 === 0) ? 0.35 : -0.35;
  card.userData.index = i;
  card.userData.baseY = 2.2;
  card.userData.color = m.color;
  scene.add(card);
  cards.push(card);

  // 軌跡上のドット
  const dotMat = new THREE.MeshBasicMaterial({ color: m.color });
  const dot = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 16), dotMat);
  dot.position.set(0, -0.4, z);
  scene.add(dot);

  // ポイントライト
  const light = new THREE.PointLight(m.color, 1.2, 8);
  light.position.set(x * 0.3, 1.5, z);
  scene.add(light);
});

// ============== カメラ操作 ==============
let cameraTargetIndex = 0;
let cameraT = 0;  // 現在のスムージング位置（インデックス相当）
let zoomLevel = 1;
let autoPlay = false;
let autoPlayTimer = 0;

function cameraPositionFor(t) {
  const z = -t * 8 + 6;
  const x = Math.sin(t * 0.5) * 1.2;
  const y = 3.5;
  return new THREE.Vector3(x, y, z);
}

function lookAtFor(t) {
  return new THREE.Vector3(0, 2, -t * 8);
}

function updateDetail(index) {
  const m = milestones[index];
  document.getElementById('d-chip').textContent = `CHAPTER ${String(index + 1).padStart(2, '0')}`;
  document.getElementById('d-title').textContent = m.title;
  document.getElementById('d-date').textContent = m.date;
  document.getElementById('d-body').textContent = m.body;
  document.getElementById('counter-cur').textContent = String(index + 1).padStart(2, '0');

  const progress = index / (milestones.length - 1);
  document.getElementById('progress').style.transform = `scaleX(${progress})`;
  document.getElementById('detail').classList.add('show');
}

document.getElementById('counter-total').textContent = String(milestones.length).padStart(2, '0');

window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') {
    cameraTargetIndex = Math.min(milestones.length - 1, cameraTargetIndex + 1);
    updateDetail(cameraTargetIndex);
  } else if (e.key === 'ArrowLeft') {
    cameraTargetIndex = Math.max(0, cameraTargetIndex - 1);
    updateDetail(cameraTargetIndex);
  } else if (e.key === 'ArrowUp') {
    zoomLevel = Math.max(0.5, zoomLevel - 0.1);
  } else if (e.key === 'ArrowDown') {
    zoomLevel = Math.min(2.5, zoomLevel + 0.1);
  } else if (e.key === ' ') {
    e.preventDefault();
    autoPlay = !autoPlay;
    autoPlayTimer = 0;
  }
});

// ホイールでも進める
window.addEventListener('wheel', (e) => {
  if (e.deltaY > 30) {
    cameraTargetIndex = Math.min(milestones.length - 1, cameraTargetIndex + 1);
    updateDetail(cameraTargetIndex);
  } else if (e.deltaY < -30) {
    cameraTargetIndex = Math.max(0, cameraTargetIndex - 1);
    updateDetail(cameraTargetIndex);
  }
}, { passive: true });

// タッチでスワイプ
let touchStartY = null;
window.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; });
window.addEventListener('touchend', (e) => {
  if (touchStartY === null) return;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy < -40) { cameraTargetIndex = Math.min(milestones.length - 1, cameraTargetIndex + 1); updateDetail(cameraTargetIndex); }
  else if (dy > 40) { cameraTargetIndex = Math.max(0, cameraTargetIndex - 1); updateDetail(cameraTargetIndex); }
  touchStartY = null;
});

// ============== アニメーションループ ==============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();

  // 自動再生
  if (autoPlay) {
    autoPlayTimer += dt;
    if (autoPlayTimer > 4) {
      autoPlayTimer = 0;
      cameraTargetIndex = (cameraTargetIndex + 1) % milestones.length;
      updateDetail(cameraTargetIndex);
    }
  }

  // カメラスムージング
  cameraT += (cameraTargetIndex - cameraT) * Math.min(1, dt * 3);
  const camPos = cameraPositionFor(cameraT);
  camPos.multiplyScalar(zoomLevel);
  camPos.y = 3.5 + (zoomLevel - 1) * 1.5;
  camera.position.copy(camPos);
  camera.lookAt(lookAtFor(cameraT));

  // でんすけが現在のチャプターを追いかける
  const denskeTargetZ = -cameraT * 8 + 1;
  denske.position.z += (denskeTargetZ - denske.position.z) * Math.min(1, dt * 2);
  denske.position.x = 2.8 + Math.sin(t * 1.5) * 0.05;
  denske.position.y = Math.abs(Math.sin(t * 4)) * 0.04;
  denske.rotation.y = Math.sin(t * 0.6) * 0.15 - 0.2;
  if (denske.userData.tail) {
    denske.userData.tail.rotation.y = Math.sin(t * 8) * 0.6;
  }

  // カードのホバリング・近接強調
  cards.forEach((card, i) => {
    const dist = Math.abs(i - cameraT);
    card.position.y = card.userData.baseY + Math.sin(t * 0.8 + i * 0.5) * 0.15;
    const focus = Math.max(0, 1 - dist * 0.5);
    card.material.opacity = 0.4 + focus * 0.6;
    card.scale.setScalar(0.85 + focus * 0.25);
  });

  // 星の微回転
  scene.children.forEach(c => {
    if (c.type === 'Points') c.rotation.y += dt * 0.005;
  });

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// イントロを閉じる
document.getElementById('intro').addEventListener('click', () => {
  document.getElementById('intro').classList.add('hide');
  updateDetail(0);
});

animate();
</script>
