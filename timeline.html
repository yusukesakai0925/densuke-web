<style>

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);

    padding: 28px 32px 16px; max-width: 1100px; margin: 0 auto;

  header.site h1 {
    margin: 0 0 4px; font-size: 22px; color: var(--accent);
    letter-spacing: 0.08em; font-weight: 600;
  }
  header.site .lede { margin: 0; color: var(--muted); font-size: 13px; }

  .scene-wrap {
    position: relative; width: 100%; max-width: 1100px;
    margin: 18px auto 0;
    height: 62vh; min-height: 460px; max-height: 720px;
    border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; background: #04060c;
    box-shadow: 0 0 40px rgba(125,244,255,0.05) inset;

  #scene { display: block; width: 100%; height: 100%; }

    background: rgba(8,14,22,0.55); border: 1px solid var(--border);
    padding: 6px 10px; border-radius: 5px;

    pointer-events: none;
  }
  .hud .k { color: var(--accent); }

  .detail {
    position: absolute; top: 14px; right: 16px; width: 320px; max-width: calc(100% - 32px);
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 18px;
    backdrop-filter: blur(6px);
    transform: translateX(360px); transition: transform 0.35s ease;
    pointer-events: auto;
    max-height: calc(100% - 28px); overflow-y: auto;
  }
  .detail.open { transform: translateX(0); }
  .detail .close {
    position: absolute; top: 8px; right: 12px;
    cursor: pointer; color: var(--muted); font-size: 18px; line-height: 1;
    background: none; border: 0;

  .detail .tags { margin-top: 8px; }
  .detail .tag {
    display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 3px;
    background: rgba(125,244,255,0.1); color: var(--accent); margin-right: 4px;
    border: 1px solid var(--border);

  .controls {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(8,14,22,0.6); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 12px; font-size: 11px; color: var(--muted);
    backdrop-filter: blur(4px);
    display: flex; gap: 14px; align-items: center;
  }
  .controls button {
    background: transparent; border: 1px solid var(--border); color: var(--accent);
    padding: 3px 10px; font-size: 11px; border-radius: 3px; cursor: pointer;
    font-family: inherit;
  }
  .controls button:hover { background: rgba(125,244,255,0.08); }

  section.timeline {
    max-width: 1100px; margin: 32px auto; padding: 0 32px;
  }
  section.timeline h2 {
    color: var(--accent); font-size: 15px; margin: 0 0 14px;
    letter-spacing: 0.06em; padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .events {
    display: grid; gap: 10px;
  }
  .event {
    display: grid; grid-template-columns: 110px 1fr;
    gap: 18px; padding: 12px 14px; border-radius: 6px;
    border: 1px solid rgba(125,244,255,0.08);
    background: rgba(20,28,40,0.35);
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
  }
  .event:hover { border-color: var(--border); background: rgba(20,28,40,0.6); }
  .event.active { border-color: var(--accent); background: rgba(125,244,255,0.06); }
  .event .when { color: var(--accent); font-size: 12px; font-variant-numeric: tabular-nums; }
  .event .what { font-size: 13px; }
  .event .what .title { font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .event .what .body  { color: var(--muted); font-size: 12px; line-height: 1.55; }

  footer.site {
    max-width: 1100px; margin: 40px auto 24px; padding: 18px 32px 0;
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--muted);
    display: flex; flex-wrap: wrap; gap: 16px; justify-content: space-between;
  }
  footer.site .disclaimer { max-width: 700px; }

  @media (max-width: 760px) {
    .scene-wrap { height: 50vh; min-height: 380px; }
    .detail { width: 260px; }
    .event { grid-template-columns: 90px 1fr; gap: 12px; }
  }
</style>

const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x04060c);
scene.fog = new THREE.Fog(0x04060c, 60, 220);

const wrap = canvas.parentElement;
const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 600);
camera.position.set(0, 14, 50);

function resize() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 6;
controls.maxDistance = 120;
controls.target.set(0, 0, 0);
controls.autoRotate = true;
controls.autoRotateSpeed = 0.35;

function makeStars(count, radius) {
  const geom = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const r = radius * (0.6 + Math.random() * 0.4);
    const phi = Math.acos(2 * Math.random() - 1);
    const theta = 2 * Math.PI * Math.random();
    positions[3*i  ] = r * Math.sin(phi) * Math.cos(theta);
    positions[3*i+1] = r * Math.sin(phi) * Math.sin(theta);
    positions[3*i+2] = r * Math.cos(phi);
    const c = 0.7 + Math.random() * 0.3;
    colors[3*i  ] = c;
    colors[3*i+1] = c * (0.9 + Math.random() * 0.1);
    colors[3*i+2] = Math.min(1, c * (1.05 + Math.random() * 0.1));
  }
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.PointsMaterial({
    size: 0.5, sizeAttenuation: true, vertexColors: true, transparent: true, opacity: 0.85,
    depthWrite: false,
  });
  return new THREE.Points(geom, mat);
}
scene.add(makeStars(1400, 200));

const N = MILESTONES.length;
const curvePts = [];
const radius = 22;
for (let i = 0; i < N; i++) {
  const t = i / (N - 1);
  const angle = t * Math.PI * 1.8;
  const x = Math.cos(angle) * radius * (0.9 + 0.15 * Math.sin(t * 6));
  const z = Math.sin(angle) * radius * (0.9 + 0.15 * Math.sin(t * 6));
  const y = -10 + t * 24;
  curvePts.push(new THREE.Vector3(x, y, z));
}
const curve = new THREE.CatmullRomCurve3(curvePts, false, 'centripetal', 0.5);
const tubeGeom = new THREE.TubeGeometry(curve, 200, 0.06, 8, false);
const tubeMat = new THREE.ShaderMaterial({
  transparent: true,
  uniforms: {
    uTime: { value: 0 },
    uColorA: { value: new THREE.Color(0xffcf7a) },
    uColorB: { value: new THREE.Color(0x7df4ff) },
  },
  vertexShader: `
    varying float vT;
    void main(){
      vT = uv.x;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime;
    uniform vec3 uColorA;
    uniform vec3 uColorB;
    varying float vT;
    void main(){
      float pulse = 0.55 + 0.45 * sin(vT * 24.0 - uTime * 1.6);
      vec3 c = mix(uColorA, uColorB, vT);
      gl_FragColor = vec4(c, 0.45 + pulse * 0.25);
    }
  `,
});
const tube = new THREE.Mesh(tubeGeom, tubeMat);
scene.add(tube);

const nodes = [];
const labelSprites = [];
const raycaster = new THREE.Raycaster();

function makeLabelTexture(date, title) {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 128;
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle = '#7df4ff';
  ctx.font = 'bold 26px -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif';
  ctx.textBaseline = 'top';
  ctx.fillText(date, 16, 12);
  ctx.fillStyle = '#e6ecf2';
  ctx.font = '600 30px -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif';
  ctx.fillText(title, 16, 52);
  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  return tex;
}

const nodeGeom = new THREE.SphereGeometry(0.6, 24, 24);
const glowGeom = new THREE.SphereGeometry(1.2, 24, 24);

for (let i = 0; i < N; i++) {
  const t = i / (N - 1);
  const pos = curvePts[i];
  const color = new THREE.Color().lerpColors(
    new THREE.Color(0xffb86c), new THREE.Color(0x7df4ff), t
  );

  const mat = new THREE.MeshBasicMaterial({ color });
  const node = new THREE.Mesh(nodeGeom, mat);
  node.position.copy(pos);
  node.userData = { index: i };
  scene.add(node);
  nodes.push(node);

  const glowMat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity: 0.18, depthWrite: false,
  });
  const glow = new THREE.Mesh(glowGeom, glowMat);
  glow.position.copy(pos);
  scene.add(glow);

  const tex = makeLabelTexture(MILESTONES[i].date, MILESTONES[i].title);
  const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false, depthWrite: false });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.position.copy(pos);
  sprite.position.y += 2.0;
  sprite.scale.set(7, 1.75, 1);
  sprite.userData = { index: i };
  scene.add(sprite);
  labelSprites.push(sprite);
}

scene.add(new THREE.AmbientLight(0x8aa0b6, 0.5));

const detail = document.getElementById('detail');
const detailDate = document.getElementById('detail-date');
const detailTitle = document.getElementById('detail-title');
const detailBody = document.getElementById('detail-body');
const detailTags = document.getElementById('detail-tags');
const counter = document.getElementById('counter');
let selected = -1;
let flyTarget = null;
const flyDuration = 1.1;

function selectIndex(i, opts = {}) {
  if (i < 0 || i >= N) return;
  selected = i;
  const m = MILESTONES[i];
  detailDate.textContent = m.date;
  detailTitle.textContent = m.title;
  detailBody.textContent = m.body;
  detailTags.innerHTML = (m.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
  detail.classList.add('open');
  detail.setAttribute('aria-hidden', 'false');
  counter.textContent = `${i+1} / ${N}`;

  document.querySelectorAll('.event').forEach((el, idx) => {
    el.classList.toggle('active', idx === i);
  });

  if (opts.fly !== false) {
    flyToNode(i);
  }
}

function flyToNode(i) {
  const p = curvePts[i];
  const target = p.clone();
  const offset = new THREE.Vector3(p.x * 0.55, p.y + 4, p.z * 0.55).add(
    new THREE.Vector3(8, 6, 10)
  );
  flyTarget = { target, offset, t: 0 };
  controls.autoRotate = false;
  setPlayState(false);
}

document.getElementById('detail-close').addEventListener('click', () => {
  detail.classList.remove('open');
  detail.setAttribute('aria-hidden', 'true');
  selected = -1;
  document.querySelectorAll('.event').forEach(el => el.classList.remove('active'));
});

const pointer = new THREE.Vector2();
let pointerDown = null;
canvas.addEventListener('pointerdown', e => {
  const rect = canvas.getBoundingClientRect();
  pointerDown = { x: e.clientX - rect.left, y: e.clientY - rect.top };
});
canvas.addEventListener('pointerup', e => {
  if (!pointerDown) return;
  const rect = canvas.getBoundingClientRect();
  const dx = (e.clientX - rect.left) - pointerDown.x;
  const dy = (e.clientY - rect.top) - pointerDown.y;
  pointerDown = null;
  if (Math.hypot(dx, dy) > 6) return;
  const x = ((e.clientX - rect.left) / rect.width)  * 2 - 1;
  const y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
  pointer.set(x, y);
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects([...nodes, ...labelSprites], false);
  if (hits.length) {
    const idx = hits[0].object.userData.index;
    selectIndex(idx);
  }
});

const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');
const playBtn = document.getElementById('play-btn');
let playing = true;

function setPlayState(p) {
  playing = p;
  playBtn.textContent = p ? '⏸' : '▶';
  controls.autoRotate = p && selected < 0;
}
setPlayState(true);

prevBtn.addEventListener('click', () => {
  selectIndex(selected < 0 ? N - 1 : (selected - 1 + N) % N);
});
nextBtn.addEventListener('click', () => {
  selectIndex(selected < 0 ? 0 : (selected + 1) % N);
});
playBtn.addEventListener('click', () => setPlayState(!playing));

const list = document.getElementById('events-list');
list.innerHTML = MILESTONES.map((m, i) => `
  <div class="event" data-idx="${i}">
    <div class="when">${m.date}</div>
    <div class="what">
      <div class="title">${m.title}</div>
      <div class="body">${m.body}</div>
    </div>
  </div>
`).join('');
list.querySelectorAll('.event').forEach(el => {
  el.addEventListener('click', () => {
    const idx = parseInt(el.dataset.idx, 10);
    selectIndex(idx);
    document.querySelector('.scene-wrap').scrollIntoView({ behavior: 'smooth', block: 'center' });
  });
});
counter.textContent = `— / ${N}`;

const clock = new THREE.Clock();

function animate() {
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();
  tubeMat.uniforms.uTime.value = t;

  for (let i = 0; i < nodes.length; i++) {
    const base = (i === selected ? 1.7 : 1.0);
    const s = base * (1 + 0.08 * Math.sin(t * 1.6 + i * 0.7));
    nodes[i].scale.setScalar(s);
  }

  if (flyTarget) {
    flyTarget.t = Math.min(1, flyTarget.t + dt / flyDuration);
    const ease = 1 - Math.pow(1 - flyTarget.t, 3);
    controls.target.lerp(flyTarget.target, 0.18 * (1 + ease));
    camera.position.lerp(flyTarget.offset, 0.18 * (1 + ease));
    if (flyTarget.t >= 1) flyTarget = null;
  }

  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
